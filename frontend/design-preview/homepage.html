/* ─────────────────────────────────────────────
   3D Hero — floating crystal with mouse parallax
───────────────────────────────────────────── */
function Hero3D() {
  const mountRef = useRef(null);
  const mouse = useRef({ x: 0, y: 0, tx: 0, ty: 0 });

  useEffect(() => {
    const mount = mountRef.current;
    const w = mount.clientWidth, h = mount.clientHeight;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, w/h, 0.1, 100);
    camera.position.z = 5.2;

    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(w, h);
    mount.appendChild(renderer.domElement);

    // Lights
    const amb = new THREE.AmbientLight(0xffffff, 0.4);
    const dir = new THREE.DirectionalLight(0x10b981, 1.2); dir.position.set(3, 4, 5);
    const dir2= new THREE.DirectionalLight(0x3b82f6, 1.0); dir2.position.set(-4, -2, 3);
    const dir3= new THREE.PointLight(0x6ee7b7, 1.5, 12);   dir3.position.set(0, 2, 3);
    scene.add(amb, dir, dir2, dir3);

    // Crystal — icosahedron with subtle distortion via vertex shader
    const geo = new THREE.IcosahedronGeometry(1.7, 4);
    const mat = new THREE.MeshPhysicalMaterial({
      color: 0x0e3a3b,
      metalness: 0.2,
      roughness: 0.05,
      transmission: 0.95,
      thickness: 1.5,
      ior: 1.45,
      clearcoat: 1.0,
      clearcoatRoughness: 0.08,
      iridescence: 0.6,
      iridescenceIOR: 1.3,
      transparent: true,
      opacity: 0.92,
    });
    const crystal = new THREE.Mesh(geo, mat);
    scene.add(crystal);

    // Wireframe overlay for definition
    const wire = new THREE.Mesh(
      new THREE.IcosahedronGeometry(1.72, 1),
      new THREE.MeshBasicMaterial({ color: 0x6ee7b7, wireframe: true, transparent: true, opacity: 0.18 })
    );
    scene.add(wire);

    // Particles around
    const particles = new THREE.BufferGeometry();
    const N = 220, positions = new Float32Array(N*3);
    for (let i=0;i<N;i++){
      const r = 3 + Math.random()*1.8, t = Math.random()*Math.PI*2, p = Math.acos(2*Math.random()-1);
      positions[i*3]   = r*Math.sin(p)*Math.cos(t);
      positions[i*3+1] = r*Math.sin(p)*Math.sin(t);
      positions[i*3+2] = r*Math.cos(p);
    }
    particles.setAttribute('position', new THREE.BufferAttribute(positions,3));
    const pmat = new THREE.PointsMaterial({ color:0x60a5fa, size:0.025, transparent:true, opacity:0.7 });
    const pts = new THREE.Points(particles, pmat);
    scene.add(pts);

    // Mouse
    const onMove = (e)=>{
      const r = mount.getBoundingClientRect();
      mouse.current.tx = ((e.clientX - r.left) / r.width  - 0.5) * 2;
      mouse.current.ty = ((e.clientY - r.top)  / r.height - 0.5) * 2;
    };
    window.addEventListener('mousemove', onMove);

    // Animate
    let raf, t0 = performance.now();
    const tick = () => {
      const t = (performance.now() - t0) / 1000;
      mouse.current.x += (mouse.current.tx - mouse.current.x) * 0.05;
      mouse.current.y += (mouse.current.ty - mouse.current.y) * 0.05;

      crystal.rotation.x = t * 0.18 + mouse.current.y * 0.5;
      crystal.rotation.y = t * 0.22 + mouse.current.x * 0.7;
      crystal.position.y = Math.sin(t * 0.8) * 0.12;

      wire.rotation.copy(crystal.rotation);
      wire.position.copy(crystal.position);

      pts.rotation.y = t * 0.05;
      pts.rotation.x = t * 0.03;

      renderer.render(scene, camera);
      raf = requestAnimationFrame(tick);
    };
    tick();

    // Resize
    const onResize = () => {
      const W = mount.clientWidth, H = mount.clientHeight;
      camera.aspect = W/H; camera.updateProjectionMatrix();
      renderer.setSize(W, H);
    };
    window.addEventListener('resize', onResize);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('resize', onResize);
      renderer.dispose(); geo.dispose(); mat.dispose();
      mount.removeChild(renderer.domElement);
    };
  }, []);

  return <div ref={mountRef} id="hero-canvas" className="w-full h-full" />;
}

          className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/70
                     hover:text-white hover:bg-white/5 transition-all">
          <Icon name="languages" className="w-5 h-5" />
          <span className="text-sm font-medium">{lang === 'ar' ? 'English' : 'العربية'}</span>
          <span className="ms-auto text-[10px] uppercase tracking-wider text-white/40">{lang}</span>
        </button>
        <button onClick={onDark}
          className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/70
                     hover:text-white hover:bg-white/5 transition-all">
          <Icon name={dark ? 'sun' : 'moon'} className="w-5 h-5" />
          <span className="text-sm font-medium">{dark ? (lang==='ar'?'فاتح':'Light') : (lang==='ar'?'داكن':'Dark')}</span>
        </button>
        <button className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/70
                          hover:text-white hover:bg-white/5 transition-all">
          <Icon name="settings" className="w-5 h-5" />
          <span className="text-sm font-medium">{T.nav.settings}</span>
        </button>
      </div>
    </motion.aside>
  );
}

/* ─────────────────────────────────────────────

───────────────────────────────────────────── */
function Hero({ lang }) {

  return (
    <section className="relative grid lg:grid-cols-[1.1fr_1fr] gap-8 items-center mb-16">

      <div>
        <motion.div
          initial={{ opacity:0, y:20 }} animate={{ opacity:1, y:0 }}
          transition={{ duration: 0.6 }}
          className="inline-flex items-center gap-2 glass rounded-full px-4 py-1.5 mb-6 text-xs">
          <Icon name="shield" className="w-3.5 h-3.5 text-forest-300" />
          <span className="text-white/80">{T.badge}</span>
          <span className="text-white/40">·</span>
          <span className="text-forest-300">{T.live}</span>
        </motion.div>

        <motion.h1
          initial={{ opacity:0, y:30 }} animate={{ opacity:1, y:0 }}
          transition={{ duration: 0.7, delay: 0.05 }}
          className="text-4xl md:text-5xl lg:text-6xl font-extrabold leading-[1.1] tracking-tight mb-2">
          <span className="gradient-text">{T.title}</span>
        </motion.h1>
        <motion.h2
          initial={{ opacity:0, y:30 }} animate={{ opacity:1, y:0 }}
          transition={{ duration: 0.7, delay: 0.15 }}
          className="text-2xl md:text-3xl font-semibold text-white/85 mb-6">
          {T.title2}
        </motion.h2>

        <motion.p
          initial={{ opacity:0, y:20 }} animate={{ opacity:1, y:0 }}
          transition={{ duration: 0.7, delay: 0.25 }}
          className="text-base md:text-lg text-white/65 max-w-xl mb-8 leading-relaxed">
          {T.subtitle}
        </motion.p>

        <motion.div
          initial={{ opacity:0, y:20 }} animate={{ opacity:1, y:0 }}
          transition={{ duration: 0.7, delay: 0.35 }}
          className="flex flex-wrap gap-3">
          <button className="glow-emerald inline-flex items-center gap-2 px-6 py-3 rounded-xl
                             bg-gradient-to-r from-forest-600 to-forest-700 text-white font-semibold
                             border border-forest-500/40">
            {T.cta}
            <Icon name="arrow" className="w-4 h-4 icon-mirror" />
          </button>
          <button className="glass inline-flex items-center gap-2 px-6 py-3 rounded-xl
                             text-white/85 hover:text-white hover:bg-white/10 font-medium transition">
            {T.secondaryCta}
          </button>
        </motion.div>

        {/* Stats */}
        <motion.div
          initial="hidden" animate="show"
          variants={{ show: { transition: { staggerChildren: 0.08, delayChildren: 0.5 } } }}
          className="grid grid-cols-4 gap-3 mt-10 max-w-xl">
          {T.stats.map((s,i)=>(
            <motion.div key={i}
              variants={{ hidden:{opacity:0,y:14}, show:{opacity:1,y:0} }}
              className="glass rounded-xl p-3 text-center">
              <div className="text-lg md:text-xl font-bold gradient-text">{s.v}</div>
              <div className="text-[10px] uppercase tracking-wider text-white/55 mt-1">{s.l}</div>
            </motion.div>
          ))}
        </motion.div>
      </div>

      {/* 3D */}
      <motion.div
        initial={{ opacity:0, scale:0.92 }} animate={{ opacity:1, scale:1 }}
        transition={{ duration: 0.9, delay: 0.2 }}
        className="relative aspect-square max-w-[520px] mx-auto w-full">
        <div className="absolute inset-0 glass rounded-[2rem] overflow-hidden">
          <Hero3D />
          <div className="absolute inset-0 pointer-events-none rounded-[2rem]"
               style={{ background:'radial-gradient(120% 80% at 50% 100%, rgba(16,185,129,0.15), transparent 60%)' }}/>
        </div>
        {/* Floating chips */}
        <motion.div
          animate={{ y: [0,-10,0] }} transition={{ duration: 4, repeat: Infinity, ease:'easeInOut' }}
          className="absolute -top-3 ltr:-left-3 rtl:-right-3 glass rounded-2xl px-3 py-2 flex items-center gap-2 text-xs">
          <Icon name="check" className="w-4 h-4 text-forest-300" />
          <span className="text-white/85">A · B · C · D</span>
        </motion.div>
        <motion.div
          animate={{ y: [0,8,0] }} transition={{ duration: 5, repeat: Infinity, ease:'easeInOut' }}
          className="absolute -bottom-3 ltr:-right-3 rtl:-left-3 glass rounded-2xl px-3 py-2 flex items-center gap-2 text-xs">
          <Icon name="chart" className="w-4 h-4 text-royal-500" />
          <span className="text-white/85">PDF · Excel</span>
        </motion.div>
      </motion.div>
    </section>
  );
}

          <motion.a key={c.key} href="#"

            whileHover={{ y: -6 }}
            className="card-rim group glass rounded-2xl p-5 cursor-pointer transition-all

            <div className="absolute -top-12 -right-12 w-40 h-40 rounded-full opacity-20 blur-3xl

            <div className="relative z-10">

                <span>{lang === 'ar' ? 'استكشف' : 'Explore'}</span>

/* ─────────────────────────────────────────────

        <span className="hover:text-white/70 cursor-pointer transition">
          {lang === 'ar' ? 'الخصوصية' : 'Privacy'}

      </div>

/* ─────────────────────────────────────────────
   App
───────────────────────────────────────────── */
function App() {
  const [lang, setLang] = useState('ar');
  const [dark, setDark] = useState(true);

  useEffect(() => {
    document.documentElement.lang = lang;
    document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';
  }, [lang]);

  return (
    <div className="min-h-screen">
      <Sidebar lang={lang} onLang={setLang} dark={dark} onDark={() => setDark(!dark)} />

      {/* Main content with offset for sidebar */}
      <main className="ltr:pl-72 rtl:pr-72 ltr:pr-6 rtl:pl-6 py-6 max-w-[1500px] mx-auto">
        <Hero lang={lang} />
        <PrimaryGrid lang={lang} />
        <SecondaryGrid lang={lang} />
        <Footer lang={lang} />
      </main>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
