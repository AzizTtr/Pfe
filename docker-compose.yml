version: '3.9'

# ─────────────────────────────────────────────────────────────────────
#  Stack de développement local pour le PFE
#  Démarrage : docker compose up -d
#  Arrêt    : docker compose down  (data persistée dans les volumes)
# ─────────────────────────────────────────────────────────────────────

services:

  # ─── MySQL (base métier de l'application) ───
  mysql:
    image: mysql:8.0
    container_name: aq-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: arabic_quality_db
      MYSQL_USER: aquser
      MYSQL_PASSWORD: aqpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── PostgreSQL (base de Keycloak — recommandé par Red Hat) ───
  keycloak-db:
    image: postgres:16
    container_name: aq-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Keycloak ───
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: aq-keycloak
    restart: unless-stopped
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_PROXY: edge
      KC_FEATURES: token-exchange,admin-fine-grained-authz
    command:
      - start-dev
      - --import-realm
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data

  # ─── MailHog (capture les emails de dev — Keycloak + app) ───
  mailhog:
    image: mailhog/mailhog:latest
    container_name: aq-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI Web

networks:
  default:
    name: aq-network

volumes:
  mysql_data:
  keycloak_db_data:
  keycloak_data:
