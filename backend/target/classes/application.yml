spring:
  application:
    name: arabic-quality-platform
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://root:@localhost:3306/arabic_quality_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 'none' : Flyway gère seul le schéma — pas de double validation Hibernate.
      # Si tu veux activer la validation pour t'assurer que entités ↔ tables collent,
      # passe à 'validate' ET aligne les types (CHAR vs VARCHAR notamment).
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ──────────── Resource Server (Keycloak) ────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak issuer URI — Spring va auto-découvrir le JWKS
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8180/realms/arabic-quality}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8180/realms/arabic-quality/protocol/openid-connect/certs}

  mail:
    # En dev : MailHog sur localhost:1025 (lancé par docker-compose)
    # Visualiser les emails sur http://localhost:8025
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  messages:
    basename: i18n/messages
    default-locale: ar
    encoding: UTF-8

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
  forward-headers-strategy: framework

# ──────────── Configuration applicative custom ────────────
app:
  platform:
    name: Arabic Quality Platform
    url:  http://localhost:4200

  cors:
    allowed-origins:
      - http://localhost:4200
      - https://app.example.com

  storage:
    type: local                        # local | s3
    local:
      base-path: ${UPLOAD_PATH:./uploads}
    max-file-size-mb: 10
    allowed-mime-types:
      - application/pdf
      - image/jpeg
      - image/png
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet

  keycloak:
    server-url: ${KEYCLOAK_URL:http://localhost:8180}
    realm: ${KEYCLOAK_REALM:arabic-quality}
    admin:
      client-id: ${KEYCLOAK_ADMIN_CLIENT:admin-cli}
      client-secret: ${KEYCLOAK_ADMIN_SECRET:}
      username: ${KEYCLOAK_ADMIN_USER:admin}
      password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
    frontend-client-id: frontend-spa

  scoring:
    auto-calculate-on-final-approval: true

  notifications:
    enabled: true
    send-email: true

springdoc:
  swagger-ui:
    path: /swagger-ui
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    tn.pfe: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
